<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition template="layout.xhtml">
    <ui:define name="content">
        <h1>Retirar</h1>
        <h:form>
            <h:panelGrid columns="2">
                <h:outputLabel value="Monto:" />
                <h:inputText value="#{userSession.withdrawAmount}" />
                <h:outputLabel value="PIN:" />
                <h:inputSecret value="#{userSession.withdrawPin}" />
            </h:panelGrid>
            <h:commandButton value="Confirmar" action="#{userSession.withdrawAction}" />
            <h:commandButton value="Volver" action="menu.xhtml" immediate="true"/>
        </h:form>
    </ui:define>
</ui:composition>
</html>
