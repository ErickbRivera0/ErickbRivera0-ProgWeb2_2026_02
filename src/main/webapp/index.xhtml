<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition template="layout.xhtml">
    <ui:define name="content">
        <h1>Iniciar sesión</h1>
        <h:form>
            <h:panelGrid columns="2">
                <h:outputLabel for="account" value="Cuenta:" />
                <h:inputText id="account" value="#{userSession.loginAccount}" />
            </h:panelGrid>
            <h:panelGrid columns="2" style="margin-top:10px">
                <h:outputLabel for="pin" value="PIN:" />
                <h:inputSecret id="pin" value="#{userSession.loginPin}" />
            </h:panelGrid>
            <div class="actions" style="margin-top:12px">
                <h:commandButton value="Entrar" action="#{userSession.loginAction}" styleClass="btn primary" />
                <h:button value="Registro" outcome="register.xhtml" />
            </div>
        </h:form>
        <h:panelGroup>
            <h:outputText value="#{userSession.error}" style="color:#b91c1c;font-weight:bold" rendered="#{not empty userSession.error}" />
            <h:outputText value="#{userSession.message}" style="color:#065f46;font-weight:bold" rendered="#{not empty userSession.message}" />
        </h:panelGroup>
    </ui:define>
</ui:composition>
</html>
