<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition template="layout.xhtml">
    <ui:define name="content">
        <h1>Historial de Transacciones</h1>
        <h:panelGroup>
            <h:outputText value="#{userSession.error}" style="color:#b91c1c;font-weight:bold" rendered="#{not empty userSession.error}" />
            <h:outputText value="#{userSession.message}" style="color:#065f46;font-weight:bold" rendered="#{not empty userSession.message}" />
        </h:panelGroup>
        <h:dataTable value="#{userSession.current.transactions}" var="t" cellpadding="6">
            <h:column>
                <f:facet name="header">Transacción</f:facet>
                #{t}
            </h:column>
        </h:dataTable>
        <h:form>
            <h:commandButton value="Exportar historial" action="#{userSession.exportHistory}" />
            <h:commandButton value="Volver" action="menu.xhtml" immediate="true" />
        </h:form>
    </ui:define>
</ui:composition>
</html>
