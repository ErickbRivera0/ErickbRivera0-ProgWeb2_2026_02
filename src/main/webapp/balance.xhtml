<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition template="layout.xhtml">
    <ui:define name="content">
        <h1>Saldo Actual</h1>
        <h:panelGroup>
            <h:outputText value="Cuenta: #{userSession.current.accountNumber}" rendered="#{userSession.logged}" />
            <h:outputText value="Saldo: $#{userSession.current.balance}" rendered="#{userSession.logged}" />
            <h:outputText value="#{userSession.error}" style="color:#b91c1c;font-weight:bold" rendered="#{not empty userSession.error}" />
        </h:panelGroup>
        <h:commandButton value="Volver" action="menu.xhtml" immediate="true" />
    </ui:define>
</ui:composition>
</html>
